<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{SUBJECT}}</title>
  <!--[if mso]>
  <style>body{font-family:Arial,sans-serif!important;}</style>
  <![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#ffffff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1a1a1a;font-size:15px;line-height:1.6;">

  <!-- Container -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td align="center" style="padding:30px 20px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;">

          <!-- Body -->
          <tr>
            <td style="padding:0 0 30px 0;font-size:15px;line-height:1.7;color:#1a1a1a;">
              {{BODY_HTML}}
            </td>
          </tr>

          <!-- Signature -->
          <tr>
            <td style="padding:20px 0 0 0;border-top:2px solid #1a1a1a;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <!-- Asterisk -->
                  <td valign="top" style="padding-right:14px;">
                    <div style="width:40px;height:40px;background-color:#FF0000;border:2px solid #1a1a1a;text-align:center;line-height:38px;font-size:24px;font-weight:800;color:#ffffff;font-family:'Syne',Arial,sans-serif;">*</div>
                  </td>
                  <!-- Info -->
                  <td valign="top" style="font-size:13px;line-height:1.5;color:#1a1a1a;">
                    <strong style="font-size:14px;">{{SENDER_NAME}}</strong><br>
                    <span style="color:#666;">BRUTAL. · Huelva</span><br>
                    <a href="https://brutalmk.com" style="color:#FF0000;text-decoration:none;font-weight:600;">brutalmk.com</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Unsubscribe -->
          <tr>
            <td style="padding:30px 0 0 0;font-size:11px;color:#999;line-height:1.5;">
              Si no quieres recibir más emails, <a href="{{UNSUBSCRIBE_URL}}" style="color:#999;text-decoration:underline;">haz clic aquí</a>.
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
